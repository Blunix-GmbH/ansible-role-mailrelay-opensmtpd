- name: create smtp-to-matrix group
  group:
    name: smtp-to-matrix
    system: True
    gid: 159

- name: create smtp-to-matrix user
  user:
    name: smtp-to-matrix
    home: "/var/lib/smtp-to-matrix"
    create_home: True
    shell: /usr/sbin/nologin
    system: True
    uid: 159

- name: create virtualenv smtp-to-matrix directory
  file:
    state: directory
    name: "/var/lib/smtp-to-matrix/.virtualenvs"
    owner: smtp-to-matrix
    group: smtp-to-matrix
    mode: "0750"

- name: create virtualenv smtp-to-matrix
  become: true
  become_user: smtp-to-matrix
  shell: "python3 -m venv /var/lib/smtp-to-matrix/.virtualenvs/smtp-to-matrix 2>&1"
  args:
    executable: /bin/bash
    creates: "/var/lib/smtp-to-matrix/.virtualenvs/smtp-to-matrix/bin/pip"
  register: opensmtpd_mailrelay_smtp_to_matrix_create_venv_out

- name: print create virtualenv smtp-to-matrix output
  debug:
    msg: "{{ opensmtpd_mailrelay_smtp_to_matrix_create_venv_out.stdout }}"

- name: install pip packages in smtp-to-matrix virtualenv
  become: true
  become_user: smtp-to-matrix
  pip:
    name:
      - matrix_client
      - pyyaml
      - aiosmtpd
      - mail-parser
    executable: "/var/lib/smtp-to-matrix/.virtualenvs/smtp-to-matrix/bin/pip"

- name: create config directory for smtp-to-matrix
  file:
    state: directory
    name: "/etc/smtp-to-matrix"
    owner: smtp-to-matrix
    group: smtp-to-matrix
    mode: "0750"

- name: template /usr/local/sbin/smtp-to-matrix.py
  template:
    src: templates/usr/local/bin/smtp-to-matrix.py
    dest: /usr/local/bin/smtp-to-matrix.py
    owner: smtp-to-matrix
    group: smtp-to-matrix
    mode: "0550"
  notify: restart smtp-to-matrix

- name: template /etc/smtp-to-matrix/config.yml
  template:
    src: templates/etc/smtp-to-matrix/config.yml.j2
    dest: /etc/smtp-to-matrix/config-{{ mailrelay_smtp_to_matrix_relay['name'] }}.yml
    owner: smtp-to-matrix
    group: smtp-to-matrix
    mode: "0640"
  notify: restart smtp-to-matrix
  with_items: "{{ mailrelay_smtp_to_matrix_relays }}"
  when: mailrelay_smtp_to_matrix_relay['enabled'] | default(True) == True
  loop_control:
    loop_var: mailrelay_smtp_to_matrix_relay
  register: mailrelay_smtp_to_matrix_config_templates

- name: remove /etc/smtp-to-matrix/config.yml
  file:
    state: absent
    path: /etc/smtp-to-matrix/config-{{ mailrelay_smtp_to_matrix_relay['name'] }}.yml
  notify: disable smtp-to-matrix
  with_items: "{{ mailrelay_smtp_to_matrix_relays }}"
  when: mailrelay_smtp_to_matrix_relay['enabled'] | default(True) == False
  loop_control:
    loop_var: mailrelay_smtp_to_matrix_relay
  register: mailrelay_smtp_to_matrix_config_templates_disable

- name: template /etc/systemd/system/smtp-to-matrix.service
  template:
    src: templates/etc/systemd/system/smtp-to-matrix.service.j2
    dest: /etc/systemd/system/smtp-to-matrix-{{ mailrelay_smtp_to_matrix_relay['name'] }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd daemon
    - restart smtp-to-matrix
  with_items: "{{ mailrelay_smtp_to_matrix_relays }}"
  when: mailrelay_smtp_to_matrix_relay['enabled'] | default(True) == True
  loop_control:
    loop_var: mailrelay_smtp_to_matrix_relay
  register: mailrelay_smtp_to_matrix_systemd_templates

- name: remove /etc/systemd/system/smtp-to-matrix.service
  file:
    state: absent
    path: /etc/systemd/system/smtp-to-matrix-{{ mailrelay_smtp_to_matrix_relay['name'] }}.service
  notify: disable smtp-to-matrix
  with_items: "{{ mailrelay_smtp_to_matrix_relays }}"
  when: mailrelay_smtp_to_matrix_relay['enabled'] | default(True) == False
  loop_control:
    loop_var: mailrelay_smtp_to_matrix_relay
  register: mailrelay_smtp_to_matrix_systemd_templates_disable
