- name: install opensmtpd related packages
  apt:
    name:
      - opensmtpd
      - mailutils
      - python3-pip
      - python3-venv
    state: present

- name: create config directories
  file:
    state: directory
    name: "{{ mailrelay_opensmtpd_config_directory_item }}"
    owner: root
    group: opensmtpd
    mode: "0750"
  with_items:
    - "/etc/smtpd/tables"
  loop_control:
    loop_var: mailrelay_opensmtpd_config_directory_item

- name: template /etc/smtpd.conf
  template:
    src: templates/etc/smtpd.conf.j2
    dest: /etc/smtpd.conf
    owner: root
    group: opensmtpd
    mode: "0640"
  notify: restart opensmtpd

- name: template /etc/smtpd/tables/relay_secrets
  template:
    src: templates/etc/smtpd/tables/relay_secrets.j2
    dest: /etc/smtpd/tables/relay_secrets
    owner: root
    group: opensmtpd
    mode: "0640"
  notify: restart opensmtpd

- name: template /etc/smtpd/tables/
  template:
    src: templates/etc/smtpd/tables/matrix_from_and_to.j2
    dest: /etc/smtpd/tables/matrix_from_and_to_{{ mailrelay_smtp_to_matrix_relay['name'] }}
    owner: root
    group: opensmtpd
    mode: "0640"
  notify: restart opensmtpd
  with_items: "{{ mailrelay_smtp_to_matrix_relays }}"
  loop_control:
    loop_var: mailrelay_smtp_to_matrix_relay

- name: template /etc/mailname
  template:
    src: "templates/etc/mailname.j2"
    dest: /etc/mailname
    owner: root
    group: root
    mode: 0644
  notify: restart opensmtpd
