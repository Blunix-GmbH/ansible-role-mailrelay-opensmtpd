# Maximum size of email that can be send
# Keep in mind that the relay servers you use have limits too
mailrelay_opensmtpd_conf_max_message_size: 100M

# Bounce the mail (will be send to the matrix channel) after 300 seconds
mailrelay_opensmtpd_smtpd_conf_bounce_warn_interval: 300s


# Config files for filters, will be placed in /etc/smtpd/filters/ as well
opensmtpd_mailrelay_filter_configs: []
#  - src: templates/etc/smtpd/filters/regex-replace-data.yml.j2
#    name: regex-replace-data.yml


# List of relays - can be empty by default to only use smtp-to-matrix
mailrelay_opensmtpd_relays: []

# Recipient for test mails after role is applied
# Only used if relays are defined. After the role is applied, a test mail is send via each relay to this recipient.
mailrelay_testmail_recipient: "{{ lookup('env', 'git_email') }}"
